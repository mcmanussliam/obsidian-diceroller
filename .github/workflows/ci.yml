name: lint n build

on:
  push:
    branches: ["**"]
  pull_request:

env:
  NODE_VERSION: 18.x

jobs:
  lint-m-build:
    name: lint n build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v6

      - name: install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d
        with:
          version: 11

      - name: use node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: install deps
        run: pnpm install --frozen-lockfile

      - name: check formatting
        run: pnpm format:check

      - name: lint code
        run: pnpm lint

      - name: build plugin
        run: pnpm build

      - name: verify build output
        run: |
          cd dist
          test -f main.js || (echo "main.js not found after build" && exit 1)
          test -f manifest.json || (echo "manifest.json not found" && exit 1)
          test -f styles.css || (echo "styles.css not found" && exit 1)
