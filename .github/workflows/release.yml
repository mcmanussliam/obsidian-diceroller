name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  PLUGIN_NAME: actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - name: use node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: build
        run: |
          pnpm install
          pnpm build

      - name: Generate release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: ./scripts/changelog.sh "$TAG_NAME" "$TAG_NAME" > release-notes.md

      - name: zip
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mkdir ${{env.PLUGIN_NAME}}
          cp dist/main.js dist/manifest.json dist/styles.css ${{env.PLUGIN_NAME}}
          zip -r obsidian-${{env.PLUGIN_NAME}}-"$tag".zip ${{env.PLUGIN_NAME}}

      - name: release
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            --notes-file release-notes.md \
            dist/main.js dist/manifest.json dist/styles.css obsidian-${{env.PLUGIN_NAME}}-"$tag".zip
